<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Brain - AI Knowledge Assistant</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PDFJS Library for client-side PDF parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --bg-base: #0b0f19;
            --bg-surface: rgba(17, 24, 39, 0.7);
            --bg-surface-hover: rgba(31, 41, 55, 0.8);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --accent: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --sidebar-width: 420px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.08) 0px, transparent 50%);
        }

        /* App Layout */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Left Sidebar: Notes & Uploads */
        aside {
            width: var(--sidebar-width);
            border-right: 1px solid var(--border);
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .brand {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .brand i {
            font-size: 24px;
            color: var(--primary);
            text-shadow: 0 0 12px var(--primary);
        }

        .brand h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Note creation section */
        .note-creator {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], textarea {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-main);
            font-size: 14px;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        textarea {
            resize: none;
            height: 100px;
        }

        /* PDF drag and drop */
        .file-dropzone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            background: rgba(0, 0, 0, 0.1);
        }

        .file-dropzone:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.03);
        }

        .file-dropzone i {
            font-size: 24px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .file-dropzone p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .file-dropzone input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* Notes list */
        .notes-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .notes-list-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .note-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.2s ease;
        }

        .note-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-1px);
        }

        .note-card h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .note-card p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .note-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag-pill {
            background: rgba(99, 102, 241, 0.1);
            color: #a5b4fc;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        /* Right Panel: Chat interface */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: rgba(11, 15, 25, 0.3);
        }

        .chat-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header i {
            font-size: 20px;
            color: var(--accent);
        }

        .chat-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: auto;
        }

        /* Message board */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--primary);
            color: white;
        }

        .message.bot .message-avatar {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.user .message-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-bubble {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        /* Chat input */
        .chat-input-container {
            padding: 24px;
            border-top: 1px solid var(--border);
        }

        .chat-input-wrapper {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 12px;
            transition: all 0.2s ease;
        }

        .chat-input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .chat-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 14px;
            padding: 8px 4px;
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        /* Scrollbar custom styles */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Loader Animation */
        .loader-bubble {
            display: flex;
            gap: 4px;
            align-items: center;
            height: 20px;
        }

        .loader-dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loader-dot:nth-child(1) { animation-delay: -0.32s; }
        .loader-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar: Note Management -->
        <aside>
            <div class="brand">
                <i class="fa-solid fa-brain"></i>
                <h1>Second Brain</h1>
            </div>

            <!-- Create new note panel -->
            <div class="note-creator">
                <div class="input-group">
                    <label>Title</label>
                    <input type="text" id="note-title" placeholder="e.g. Docker commands guide">
                </div>
                <div class="input-group">
                    <label>Content</label>
                    <textarea id="note-content" placeholder="Type your note content here, or upload a PDF below..."></textarea>
                </div>
                
                <!-- PDF Upload Zone -->
                <div class="file-dropzone">
                    <i class="fa-solid fa-file-pdf"></i>
                    <p id="pdf-status">Drag & drop a PDF to extract text</p>
                    <input type="file" id="pdf-file" accept="application/pdf">
                </div>

                <button class="btn" onclick="saveNote()">
                    <i class="fa-solid fa-plus"></i> Save Note
                </button>
            </div>

            <!-- Notes List -->
            <div class="notes-list-container">
                <div class="notes-list-header">Your Notes</div>
                <div id="notes-list" style="display: flex; flex-direction: column; gap: 12px;">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </aside>

        <!-- Main Workspace: Chat with AI -->
        <main>
            <div class="chat-header">
                <i class="fa-solid fa-comments"></i>
                <h2>Chat Assistant</h2>
                <p><i class="fa-solid fa-circle" style="color: var(--accent); font-size: 8px; margin-right: 4px;"></i> Grounded by your notes</p>
            </div>

            <!-- Messages lists -->
            <div class="chat-messages" id="chat-messages">
                <div class="message bot">
                    <div class="message-avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="message-bubble">
                        Hello! I am your AI Knowledge Assistant. Ask me anything about the notes you've saved.
                    </div>
                </div>
            </div>

            <!-- Input controller -->
            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <input type="text" id="chat-input" placeholder="Ask a question about your knowledge base..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendChatMessage()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // Load existing notes on page load
        document.addEventListener('DOMContentLoaded', fetchNotes);

        // Fetch notes from Backend API
        async function fetchNotes() {
            try {
                const response = await fetch('/api/notes');
                if (response.ok) {
                    const notes = await response.json();
                    renderNotes(notes);
                }
            } catch (error) {
                console.error("Failed to fetch notes:", error);
            }
        }

        // Render notes cards
        function renderNotes(notes) {
            const list = document.getElementById('notes-list');
            list.innerHTML = '';
            
            if (notes.length === 0) {
                list.innerHTML = `<div style="color: var(--text-muted); font-size: 13px; text-align: center; padding: 20px;">No notes saved yet. Add one above!</div>`;
                return;
            }

            notes.forEach(note => {
                const card = document.createElement('div');
                card.className = 'note-card';
                
                // Parse tags
                const tagsHtml = note.tags 
                    ? note.tags.split(',')
                        .map(tag => `<span class="tag-pill">${tag.trim()}</span>`)
                        .join('')
                    : '';

                card.innerHTML = `
                    <h3>${note.title}</h3>
                    <p style="font-weight: 500; color: #a5b4fc; margin-bottom: 4px; font-size: 12px;">AI Summary:</p>
                    <p>${note.summary || 'Generating summary...'}</p>
                    <div class="note-meta">${tagsHtml}</div>
                `;
                list.appendChild(card);
            });
        }

        // Save note
        async function saveNote() {
            const titleInput = document.getElementById('note-title');
            const contentInput = document.getElementById('note-content');
            
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();

            if (!title || !content) {
                alert("Please fill in both title and content.");
                return;
            }

            try {
                const response = await fetch('/api/notes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });

                if (response.ok) {
                    titleInput.value = '';
                    contentInput.value = '';
                    document.getElementById('pdf-status').innerText = 'Drag & drop a PDF to extract text';
                    fetchNotes();
                } else {
                    alert("Error saving note.");
                }
            } catch (error) {
                console.error("Failed to save note:", error);
            }
        }

        // Handle PDF text extraction
        document.getElementById('pdf-file').addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const statusText = document.getElementById('pdf-status');
            statusText.innerText = "Extracting text from PDF...";

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let textContent = "";

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    const pageText = text.items.map(item => item.str).join(" ");
                    textContent += pageText + "\n";
                }

                document.getElementById('note-content').value = textContent.trim();
                
                // Automatically guess a title based on filename
                const autoTitle = file.name.replace(/\.[^/.]+$/, "").replace(/[_-]/g, " ");
                document.getElementById('note-title').value = autoTitle;

                statusText.innerText = `Successfully loaded: ${file.name}`;
            } catch (error) {
                console.error("PDF Parsing failed:", error);
                statusText.innerText = "Failed to parse PDF.";
            }
        });

        // Chat functionality
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendChatMessage();
            }
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            // Render user message
            appendMessage('user', message);
            input.value = '';

            // Render bot loader
            const loaderId = appendLoader();

            try {
                const response = await fetch(`/api/chat?message=${encodeURIComponent(message)}`, {
                    method: 'POST'
                });

                // Remove loader
                removeLoader(loaderId);

                if (response.ok) {
                    const botReply = await response.text();
                    appendMessage('bot', botReply);
                } else {
                    appendMessage('bot', "Sorry, I had trouble connecting to my brain. Please try again.");
                }
            } catch (error) {
                removeLoader(loaderId);
                appendMessage('bot', "Connection error. Make sure your server is running.");
            }
        }

        function appendMessage(sender, text) {
            const chatMessages = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;

            const avatarIcon = sender === 'user' ? 'fa-user' : 'fa-robot';

            msgDiv.innerHTML = `
                <div class="message-avatar"><i class="fa-solid ${avatarIcon}"></i></div>
                <div class="message-bubble">${text}</div>
            `;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendLoader() {
            const chatMessages = document.getElementById('chat-messages');
            const loaderDiv = document.createElement('div');
            const id = 'loader-' + Date.now();
            loaderDiv.id = id;
            loaderDiv.className = 'message bot';
            loaderDiv.innerHTML = `
                <div class="message-avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="message-bubble">
                    <div class="loader-bubble">
                        <div class="loader-dot"></div>
                        <div class="loader-dot"></div>
                        <div class="loader-dot"></div>
                    </div>
                </div>
            `;
            chatMessages.appendChild(loaderDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return id;
        }

        function removeLoader(id) {
            const loader = document.getElementById(id);
            if (loader) loader.remove();
        }
    </script>
</body>
</html>
