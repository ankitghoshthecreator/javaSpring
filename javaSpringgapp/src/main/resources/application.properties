spring.application.name=javaSpringgapp
# PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5434/secondbrain
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.jpa.hibernate.ddl-auto=update

# AI Configuration (Using Gemini via OpenAI format)
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.chat.options.model=gemini-1.5-flash
spring.ai.openai.embedding.options.model=text-embedding-004

# PGVector Store Configuration
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=768

server.port=9090
